<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedHide - Decode Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-accent: #00f0ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 { margin-top: 0; margin-bottom: 1.5rem; font-weight: 600; text-align: center; }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-accent);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary-accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.4);
        }

        pre {
            background: rgba(0,0,0,0.5);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            color: #00f0ff;
            display: none;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">MEDHIDE</a>
        <div style="display: flex; gap: 2rem;">
            <a href="/encode" style="color: #fff; text-decoration: none; font-weight: 600;">Encode</a>
            <a href="/decode" style="color: #fff; text-decoration: none; font-weight: 600;">Decode</a>
            <a href="/records" style="color: #fff; text-decoration: none; font-weight: 600;">Records</a>
        </div>
    </nav>
    <div class="container">
        <div class="glass-panel">
            <h2>Decode Patient Data</h2>
            <form id="decodeForm">
                <div class="form-group">
                    <label for="mrd">Patient MRD Number</label>
                    <input type="text" id="mrd" name="mrd" required placeholder="e.g. MRD-001">
                </div>

                <button type="submit">Extract & Decrypt</button>
            </form>
            <pre id="result"></pre>
            
            <div id="image-container" style="display: none; margin-top: 2rem; text-align: center;">
                <h3 style="color: var(--text-muted); font-size: 1rem; font-weight: 600;">Retrieved Stego-Image:</h3>
                <img id="stego-display" src="" style="max-width: 100%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);" />
            </div>
        </div>
    </div>

    <script>
        document.getElementById('decodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const resDiv = document.getElementById('result');
            
            btn.textContent = 'Processing...';
            btn.disabled = true;
            resDiv.style.display = 'none';
            resDiv.textContent = '';
            document.getElementById('image-container').style.display = 'none';

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/decode', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resDiv.style.display = 'block';
                    resDiv.style.color = '#00f0ff';
                    resDiv.textContent = JSON.stringify(data.data, null, 2);
                    
                    // Display the image
                    const mrdValue = formData.get('mrd');
                    document.getElementById('stego-display').src = `/image/${mrdValue}`;
                    document.getElementById('image-container').style.display = 'block';
                } else {
                    resDiv.style.display = 'block';
                    resDiv.style.color = '#ff003c';
                    resDiv.textContent = `Error: ${data.detail || 'Failed to decode'}`;
                }
            } catch (err) {
                resDiv.style.display = 'block';
                resDiv.style.color = '#ff003c';
                resDiv.textContent = `Network Error.`;
            } finally {
                btn.textContent = 'Extract & Decrypt';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
