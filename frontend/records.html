<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedHide - Patient Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-accent: #00f0ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-accent);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 { margin-top: 0; margin-bottom: 2rem; font-weight: 600; text-align: center; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: var(--primary-accent);
            font-weight: 600;
        }

        tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .btn-action {
            padding: 0.5rem 1rem;
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-action:hover {
            background: var(--primary-accent);
            color: #000;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">MEDHIDE</a>
        <div class="nav-links">
            <a href="/encode">Encode</a>
            <a href="/decode">Decode</a>
            <a href="/records">Records</a>
        </div>
    </nav>
    <div class="container">
        <div class="glass-panel">
            <h2>Medical Records Database (Encrypted)</h2>
            <table id="records-table">
                <thead>
                    <tr>
                        <th>MRD Number</th>
                        <th>Upload Date</th>
                        <th>Image Size</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align: center;">Loading records...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.querySelector('#records-table tbody');
            try {
                const res = await fetch('/api/records');
                const data = await res.json();
                
                if (data.records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No records found in database.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.records.forEach(rec => {
                    const tr = document.createElement('tr');
                    
                    const dateObj = new Date(rec.upload_date);
                    const formattedDate = dateObj.toLocaleString();
                    const sizeKb = (rec.size_bytes / 1024).toFixed(2) + ' KB';

                    tr.innerHTML = `
                        <td style="font-weight: 600;">${rec.mrd}</td>
                        <td style="color: var(--text-muted);">${formattedDate}</td>
                        <td style="color: var(--text-muted);">${sizeKb}</td>
                        <td>
                            <a href="/image/${rec.mrd}" target="_blank" class="btn-action">View Image</a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff003c;">Failed to load records.</td></tr>';
            }
        });
    </script>
</body>
</html>
